<!DOCTYPE html>
<html>
<body style="margin:0; background:black; overflow:hidden;">
    <div id="reproductor"></div>
    <script>
        // Pon aquí los nombres exactos de tus archivos
        var archivos = ["1.mp4", "2.mp4", "1.jpg"]; 
        var indice = 0;
        var contenedor = document.getElementById("reproductor");

        function mostrar() {
            contenedor.innerHTML = "";
            var nombre = archivos[indice];
            var esVideo = nombre.indexOf(".mp4") > -1;
            var el = document.createElement(esVideo ? "video" : "img");
            
            el.src = nombre;
            el.style.width = "100vw";
            el.style.height = "100vh";
            el.style.objectFit = "cover";

            if (esVideo) {
                el.muted = true;
                el.setAttribute("muted", "muted");
                el.setAttribute("playsinline", "true");
                el.play();
                el.onended = siguiente;
            } else {
                setTimeout(siguiente, 6000); 
            }
            contenedor.appendChild(el);
        }

        function siguiente() {
            indice = (indice + 1) % archivos.length;
            mostrar();
        }
        window.onload = mostrar;
    </script>
</body>
</html>
